    <title>NoteSphere – Notes</title>

    <style>
        .spinner {
            display: inline-block;
            width: 28px; height: 28px;
            border: 3px solid rgba(255,255,255,0.2);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
            margin-right: 10px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .loading-msg {
            color: rgba(255,255,255,0.7);
            font-size: 14px;
            margin-top: 20px;
            text-align: center;
        }
        .error-msg {
            background: rgba(239,68,68,0.15);
            border: 1px solid rgba(239,68,68,0.3);
            border-radius: 12px;
            padding: 14px 20px;
            color: #fca5a5;
            font-size: 14px;
            margin-top: 20px;
            text-align: center;
        }

        /* Notes wrapper */
        .notes-wrapper {
            max-width: 900px;
            margin: 40px auto;
            padding: 20px;
        }
        .notes-wrapper h2 {
            color: white;
            font-size: 2rem;
            text-align: center;
            margin-bottom: 10px;
        }

        /* Search bar */
        .search-bar {
            display: flex;
            align-items: center;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 30px;
            padding: 10px 20px;
            margin: 20px auto;
            max-width: 420px;
            gap: 10px;
        }
        .search-bar input {
            background: none;
            border: none;
            outline: none;
            color: white;
            font-size: 14px;
            width: 100%;
            font-family: inherit;
        }
        .search-bar input::placeholder { color: rgba(255,255,255,0.45); }
        .search-bar span { font-size: 16px; opacity: 0.6; }

        /* Breadcrumb */
        .breadcrumb {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
            margin: 10px 0 16px;
            font-size: 13px;
            color: rgba(255,255,255,0.6);
        }
        .breadcrumb span { cursor: pointer; color: rgba(255,255,255,0.85); }
        .breadcrumb span:hover { text-decoration: underline; }
        .breadcrumb .sep { opacity: 0.4; }

        /* Back button */
        .back-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            padding: 8px 18px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            font-family: inherit;
            transition: 0.3s;
            margin: 10px auto 0;
            display: block;
            width: fit-content;
        }
        .back-btn:hover { background: rgba(255,255,255,0.2); }

        /* Section title */
        .section-title {
            color: white;
            text-align: center;
            margin: 24px 0 10px;
            font-size: 1rem;
            opacity: 0.75;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        /* Folder grid */
        .drive-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            margin: 12px auto;
            max-width: 900px;
        }

        /* Folder buttons */
        .drive-folder-btn {
            padding: 12px 22px;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.25);
            background: rgba(255,255,255,0.12);
            color: white;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.3s;
            backdrop-filter: blur(10px);
            font-family: inherit;
        }
        .drive-folder-btn:hover {
            background: rgba(255,255,255,0.28);
            transform: scale(1.04);
        }

        /* File cards — notes show as cards not pills */
        .notes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 16px;
            margin: 12px auto;
            max-width: 900px;
        }
        .note-card {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.18);
            border-radius: 16px;
            padding: 20px 16px;
            color: white;
            text-align: center;
            text-decoration: none;
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            backdrop-filter: blur(12px);
        }
        .note-card:hover {
            background: rgba(255,255,255,0.2);
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
        }
        .note-card .note-icon { font-size: 32px; }
        .note-card .note-name {
            font-size: 13px;
            font-weight: 500;
            word-break: break-word;
            line-height: 1.4;
        }
        .note-card .note-action {
            font-size: 11px;
            color: rgba(255,255,255,0.55);
            margin-top: 4px;
        }

        .empty-msg {
            color: rgba(255,255,255,0.5);
            font-size: 14px;
            text-align: center;
            margin-top: 30px;
        }

        /* Highlighted search results */
        .note-card.hidden { display: none; }
    </style>
</head>

<script>

// =============================================
//  ⚠️ PASTE YOUR API KEY BELOW (in VS Code)
// =============================================
const API_KEY        = 'AIzaSyCA-kkRt4scstjukoEDYToj7KElLSQWQi4';
const ROOT_FOLDER_ID = '1X3drZAn28S39vMwOpJQMCOrXEYU6fvku';
// =============================================

let folderStack = [{ id: ROOT_FOLDER_ID, name: 'Notes' }];

function logout() {
    localStorage.removeItem('notesphere_user');
    localStorage.removeItem('notesphere_login_time');
    window.location.replace('google_signin_test.html');
}

async function fetchFolder(folderId) {
    const url = `https://www.googleapis.com/drive/v3/files`
              + `?q='${folderId}'+in+parents+and+trashed=false`
              + `&key=${API_KEY}`
              + `&fields=files(id,name,mimeType)`
              + `&orderBy=name`;
    const res = await fetch(url);
    if (!res.ok) throw new Error(`Drive API error ${res.status}`);
    const data = await res.json();
    return data.files || [];
}

async function renderFolder() {
    const content = document.getElementById('drive-content');
    const crumb   = document.getElementById('breadcrumb');
    const current = folderStack[folderStack.length - 1];

    // Hide search on root, show inside folders
    document.getElementById('searchInput').value = '';
    document.querySelector('.search-bar').style.display =
        folderStack.length > 1 ? 'flex' : 'none';

    content.innerHTML = `<div class="loading-msg"><span class="spinner"></span> Loading...</div>`;

    // Breadcrumb
    crumb.innerHTML = folderStack.map((f, i) => {
        if (i === folderStack.length - 1)
            return `<span style="color:white;font-weight:600;cursor:default;">📁 ${f.name}</span>`;
        return `<span onclick="goTo(${i})">📁 ${f.name}</span><span class="sep">›</span>`;
    }).join('');

    try {
        const files   = await fetchFolder(current.id);
        const folders = files.filter(f => f.mimeType === 'application/vnd.google-apps.folder');
        const pdfs    = files.filter(f => f.mimeType !== 'application/vnd.google-apps.folder');

        if (files.length === 0) {
            content.innerHTML = `<div class="empty-msg">📭 No notes found in this folder.</div>`;
            return;
        }

        let html = folderStack.length > 1
            ? `<button class="back-btn" onclick="goBack()">← Back</button>`
            : '';

        // Folders
        if (folders.length > 0) {
            html += `<p class="section-title">📁 Folders</p><div class="drive-grid">`;
            folders.forEach(f => {
                html += `<button class="drive-folder-btn" onclick="openFolder('${f.id}','${f.name.replace(/'/g,"\\'")}')">📁 ${f.name}</button>`;
            });
            html += `</div>`;
        }

        // PDF notes — displayed as cards
        if (pdfs.length > 0) {
            html += `<p class="section-title">📄 Notes</p><div class="notes-grid" id="notesGrid">`;
            pdfs.forEach(f => {
                const preview = `https://drive.google.com/file/d/${f.id}/preview`;
                html += `
                    <a class="note-card" href="${preview}" target="_blank" data-name="${f.name.toLowerCase()}">
                        <div class="note-icon">📄</div>
                        <div class="note-name">${f.name}</div>
                        <div class="note-action">Click to open ↗</div>
                    </a>`;
            });
            html += `</div>`;
        }

        content.innerHTML = html;

    } catch (err) {
        console.error(err);
        content.innerHTML = `
            <div class="error-msg">
                ❌ Could not load notes. Check:<br>
                1. API Key is correct<br>
                2. Folder is shared as "Anyone with link"<br>
                3. Google Drive API is enabled<br><br>
                <small>${err.message}</small>
            </div>`;
    }
}

// Search filter
function filterNotes() {
    const query = document.getElementById('searchInput').value.toLowerCase();
    const cards = document.querySelectorAll('.note-card');
    cards.forEach(card => {
        const name = card.getAttribute('data-name') || '';
        card.classList.toggle('hidden', !name.includes(query));
    });
}

function openFolder(id, name) { folderStack.push({ id, name }); renderFolder(); }
function goBack()              { if (folderStack.length > 1) { folderStack.pop(); renderFolder(); } }
function goTo(i)               { folderStack = folderStack.slice(0, i + 1); renderFolder(); }

// Hide search on load until inside a folder
document.querySelector('.search-bar').style.display = 'none';

renderFolder();
</script>
<script src="js/templatemo-glossy-touch.js"></script>
