        .spinner {
            display: inline-block;
            width: 28px; height: 28px;
            border: 3px solid rgba(255,255,255,0.2);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
            margin-right: 10px;

        @keyframes spin { to { transform: rotate(360deg); } }

        .loading-msg {
            color: rgba(255,255,255,0.7);
            font-size: 14px;
            margin-top: 20px;
            text-align: center;
        }
        .error-msg {
            background: rgba(239,68,68,0.15);
            border: 1px solid rgba(239,68,68,0.3);
            border-radius: 12px;
            padding: 14px 20px;
            color: #fca5a5;
            font-size: 14px;
            margin-top: 20px;
            text-align: center;
        }
        .drive-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            margin: 16px auto;
            max-width: 900px;
        }
        .drive-folder-btn {
            padding: 11px 22px;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.25);
            background: rgba(255,255,255,0.12);
            color: white;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.3s;
            backdrop-filter: blur(10px);
            font-family: inherit;
        }
        .drive-folder-btn:hover { background: rgba(255,255,255,0.28); transform: scale(1.04); }

        .drive-file-btn {
            padding: 11px 22px;
            border-radius: 30px;
            text-decoration: none;
            color: white;
            font-size: 13px;
            font-weight: 500;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            transition: 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .drive-file-btn:hover { background: rgba(255,255,255,0.25); transform: scale(1.04); }

        .section-title {
            color: white;
            text-align: center;
            margin: 24px 0 10px;
            font-size: 1.1rem;
            opacity: 0.85;
        }
        .breadcrumb {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
            margin: 16px 0 8px;
            font-size: 13px;
            color: rgba(255,255,255,0.6);
        }
        .breadcrumb span { cursor: pointer; color: rgba(255,255,255,0.85); }
        .breadcrumb span:hover { text-decoration: underline; }
        .breadcrumb .sep { opacity: 0.4; }
        .back-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            padding: 8px 18px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            font-family: inherit;
            transition: 0.3s;
            margin: 10px auto;
            display: block;
        }
        .back-btn:hover { background: rgba(255,255,255,0.2); }
        .empty-msg { color: rgba(255,255,255,0.5); font-size: 14px; text-align: center; margin-top: 20px; }
    </style>

<script>
// =============================================
//  ⚠️ PASTE YOUR API KEY BELOW (in VS Code)
// =============================================
const API_KEY        = 'AIzaSyCA-kkRt4scstjukoEDYToj7KElLSQWQi4';
const ROOT_FOLDER_ID = '1Y2Eye1NTx1hhqNDXhRLnaqOf-BB-rj51';
// =============================================

let folderStack = [{ id: ROOT_FOLDER_ID, name: 'Question Papers' }];

function logout() {
    localStorage.removeItem('notesphere_user');
    localStorage.removeItem('notesphere_login_time');
    window.location.replace('google_signin_test.html');
}

async function fetchFolder(folderId) {
    const url = `https://www.googleapis.com/drive/v3/files`
              + `?q='${folderId}'+in+parents+and+trashed=false`
              + `&key=${API_KEY}`
              + `&fields=files(id,name,mimeType)`
              + `&orderBy=name`;
    const res = await fetch(url);
    if (!res.ok) throw new Error(`Drive API error ${res.status}`);
    const data = await res.json();
    return data.files || [];
}

async function renderFolder() {
    const content = document.getElementById('drive-content');
    const crumb   = document.getElementById('breadcrumb');
    const current = folderStack[folderStack.length - 1];

    content.innerHTML = `<div class="loading-msg"><span class="spinner"></span> Loading...</div>`;

    // Breadcrumb
    crumb.innerHTML = folderStack.map((f, i) => {
        if (i === folderStack.length - 1)
            return `<span style="color:white;font-weight:600;cursor:default;">📁 ${f.name}</span>`;
        return `<span onclick="goTo(${i})">📁 ${f.name}</span><span class="sep">›</span>`;
    }).join('');

    try {
        const files   = await fetchFolder(current.id);
        const folders = files.filter(f => f.mimeType === 'application/vnd.google-apps.folder');
        const pdfs    = files.filter(f => f.mimeType !== 'application/vnd.google-apps.folder');

        if (files.length === 0) {
            content.innerHTML = `<div class="empty-msg">📭 This folder is empty.</div>`;
            return;
        }

        let html = folderStack.length > 1
            ? `<button class="back-btn" onclick="goBack()">← Back</button>`
            : '';

        if (folders.length > 0) {
            html += `<p class="section-title">📁 Folders</p><div class="drive-grid">`;
            folders.forEach(f => {
                html += `<button class="drive-folder-btn" onclick="openFolder('${f.id}','${f.name.replace(/'/g,"\\'")}')">📁 ${f.name}</button>`;
            });
            html += `</div>`;
        }

        if (pdfs.length > 0) {
            html += `<p class="section-title">📄 Files</p><div class="drive-grid">`;
            pdfs.forEach(f => {
                const preview  = `https://drive.google.com/file/d/${f.id}/preview`;
                html += `<a class="drive-file-btn" href="${preview}" target="_blank">📄 ${f.name}</a>`;
            });
            html += `</div>`;
        }

        content.innerHTML = html;

    } catch (err) {
        console.error(err);
        content.innerHTML = `
            <div class="error-msg">
                ❌ Could not load files. Check:<br>
                1. API Key is correct<br>
                2. Folder is shared as "Anyone with link"<br>
                3. Google Drive API is enabled<br><br>
                <small>${err.message}</small>
            </div>`;
    }
}

function openFolder(id, name) { folderStack.push({ id, name }); renderFolder(); }
function goBack()              { if (folderStack.length > 1) { folderStack.pop(); renderFolder(); } }
function goTo(i)               { folderStack = folderStack.slice(0, i + 1); renderFolder(); }

renderFolder();
</script>
<script src="js/templatemo-glossy-touch.js"></script>
