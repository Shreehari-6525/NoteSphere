<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- ✅ Add this inside <head> of index.html, notes.html, upload.html, profile.html, admin_panel.html -->
<script>
  (function () {
    const user = localStorage.getItem("notesphere_user");
    if (!user) {
      window.location.replace("google_signin_test.html");
    }
  })();
</script>
    <title>NoteSphere – Dashboard</title>
    <link rel="stylesheet" href="css/templatemo-glossy-touch.css">
    <link rel="icon" type="image/png" href="images/logo.png">
</head>
<body>

    <!-- Background Shapes -->
    <div class="bg-shapes">
        <div class="shape"></div><div class="shape"></div><div class="shape"></div>
        <div class="shape"></div><div class="shape"></div><div class="shape"></div>
    </div>

    <!-- Mobile Overlay -->
    <div class="sidebar-overlay" onclick="toggleSidebar()"></div>

    <!-- Hamburger Button -->
    <button class="hamburger" onclick="toggleSidebar()" aria-label="Toggle Menu">
        <span></span><span></span><span></span>
    </button>

    <!-- SIDEBAR -->
    <div class="sidebar glass">
        <div class="logo">
            <div class="logo-icon">
                <svg viewBox="0 0 48 48" fill="white" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="16" cy="16" r="5" opacity="0.9"/>
                    <circle cx="32" cy="16" r="4" opacity="0.8"/>
                    <circle cx="16" cy="32" r="4" opacity="0.7"/>
                    <circle cx="32" cy="32" r="5" opacity="0.85"/>
                    <circle cx="24" cy="8"  r="2" opacity="1"/>
                    <circle cx="8"  cy="24" r="2" opacity="0.9"/>
                    <circle cx="40" cy="24" r="2" opacity="0.9"/>
                    <circle cx="24" cy="40" r="2" opacity="1"/>
                    <circle cx="8"  cy="8"  r="1" opacity="0.6"/>
                    <circle cx="40" cy="8"  r="1" opacity="0.6"/>
                    <circle cx="8"  cy="40" r="1" opacity="0.6"/>
                    <circle cx="40" cy="40" r="1" opacity="0.6"/>
                </svg>
            </div>
            <span>NoteSphere</span>
        </div>

        <div class="nav-links">
            <a href="index.html" class="active"><b>🏠 Dashboard</b></a>
            <a href="notes.html"><b>📝 Notes</b></a>
            <a href="question_papers.html"><b>📄 Question Papers</b></a>
            <a href="upload.html"><b>📤 Upload</b></a>
            <a href="profile.html"><b>👤 Profile</b></a>
            <a href="admin_panel.html"><b>🛡️ Admin Panel</b></a>
            <a href="google_signin_test.html" onclick="logout()" style="background-color:rgb(146,4,4);text-align:center;margin-top:auto;"><b>🚪 Logout</b></a>
        </div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main-content">
        <div class="page active">
            <div class="container">
                <div class="content-wrapper">
                    <section class="hero glass">
                        <div class="hero-image">
                            <img src="images/templatemo-futuristic-girl.jpg" alt="Modern Technology Interaction" />
                        </div>
                        <div class="hero-content">
                            <h1>Welcome to NoteSphere</h1>
                            <p>Experience a smarter way to manage notes, question papers, and academic resources in one seamless digital space.</p>
                        </div>
                    </section>
                </div>
            </div>
        </div>

        <!-- FOOTER -->
        <div id="footer">
            <div class="container">
                <footer class="glass">
                    <div class="footer-content">
                        <div class="copyright">
                            &copy; 2026 NoteSphere. All rights reserved. Crafted by KSE Comp TE-B.
                        </div>
                    </div>
                </footer>
            </div>
        </div>
    </div>
      <script>
      function logout() {
    	    localStorage.removeItem('notesphere_user');
    	    localStorage.removeItem('notesphere_login_time');
    	    window.location.replace('google_signin_test.html');
    	}</script>
    <script src="js/templatemo-glossy-touch.js"></script>
</body>
</html>
